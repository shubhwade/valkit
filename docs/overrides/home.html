{% extends "main.html" %}

{% block content %}
<style>
.hero {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 5rem 4rem;
  width: 100%;
  margin: 0;
  box-sizing: border-box;
}
.hero-left {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.hero-title {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}
.hero-logo {
  width: 72px;
  height: 72px;
  display: block;
}
.hero-left h1 {
  font-size: 4.4rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  margin: 0;
  line-height: 1.02;
}
.hero-left p {
  font-size: 1.1rem;
  line-height: 1.8;
  opacity: 0.92;
  margin: 1.8rem 0 0;
  max-width: 720px;
}
.hero-install {
  background: #0f1720;
  color: #a8ff78;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.95rem;
  padding: 1rem 1.35rem;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  margin-top: 2rem;
}
.md-sidebar { display: none !important; }
.md-content { margin: 0 !important; max-width: 100% !important; padding: 0 !important; }
.md-main__inner { padding-top: 0 !important; }
@media (max-width: 960px) {
  .hero {
    flex-direction: column;
    padding: 3.5rem 2rem;
  }
}
</style>

<div class="hero">
  <div class="hero-left">
    <div class="hero-title">
      <img src="/assets/valkit-logo.svg" alt="valkit logo" class="hero-logo" />
      <h1>valkit</h1>
    </div>
    <p>Financial statement analysis for AI IDEs and coding agents. Scan any ticker, get Piotroski, Altman Z, Beneish M, and a deterministic analyst brief in one command.</p>
    <div class="hero-install">$ pip install valkit</div>
  </div>
</div>

{{ page.content }}
{% endblock %}
