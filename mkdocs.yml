site_name: telmus
site_description: Financial statement analysis for AI IDEs and coding agents
docs_dir: docs
site_url: https://shubhwade.github.io/telmus
repo_url: https://github.com/shubhwade/telmus
repo_name: shubhwade/telmus
extra_css:
  - stylesheets/extra.css

theme:
  custom_dir: docs/overrides
  logo: null
  favicon: null
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - toc.integrate
    - navigation.indexes
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Reference:
    - CLI: cli.md
    - MCP server: mcp.md
    - SDK: sdk.md
  - Power BI: powerbi.md
  - Engines:
    - Health: engines/health.md
  - Changelog: changelog.md